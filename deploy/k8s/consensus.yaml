apiVersion: apps/v1
kind: Deployment
metadata:
  name: trusttrace-consensus
  namespace: trusttrace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trusttrace-consensus
  template:
    metadata:
      labels:
        app: trusttrace-consensus
    spec:
      containers:
        - name: consensus
          image: ghcr.io/trusttrace/consensus:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9091
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/trusttrace
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /healthz, port: 9091 }
      volumes:
        - name: config
          configMap:
            name: trusttrace-consensus-config
---
apiVersion: v1
kind: Service
metadata:
  name: trusttrace-consensus
  namespace: trusttrace
spec:
  selector:
    app: trusttrace-consensus
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9091
      targetPort: 9091
