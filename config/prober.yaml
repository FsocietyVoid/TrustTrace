region: "us-east-1"
node_key_path: "/tmp/node.key"
consensus_addr: "consensus:50051"
worker_count: 20
queue_depth: 500
probe_interval: "30s"
probe_timeout: "5s"
metrics_port: "9090"

targets:
  - id: "google"
    url: "https://www.google.com"
    method: "GET"
    expect_code: 200
    sla_percent: 99.9
  - id: "github"
    url: "https://github.com"
    method: "GET"
    expect_code: 200
    sla_percent: 99.95
  - id: "cloudflare"
    url: "https://www.cloudflare.com"
    method: "GET"
    expect_code: 200
    sla_percent: 99.99